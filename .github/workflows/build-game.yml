name: Release game

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: nightly

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag matches workspace version
        shell: bash
        run: |
          version="$(awk '
            /^\[workspace\.package\]/ { in_section = 1; next }
            /^\[/ { in_section = 0 }
            in_section && /^[[:space:]]*version[[:space:]]*=/ {
              value = $0
              sub(/^[^"]*"/, "", value)
              sub(/".*$/, "", value)
              print value
              exit
            }
          ' Cargo.toml)"
          tag="${GITHUB_REF_NAME#v}"

          if [ -z "${version}" ]; then
            echo "Could not read [workspace.package] version from Cargo.toml" >&2
            exit 1
          fi

          if [ "${tag}" != "${version}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match workspace version ${version}" >&2
            exit 1
          fi

  build:
    name: ${{ matrix.name }}
    needs: validate
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-14
            target: aarch64-apple-darwin
            artifact: thalos_game-macos-arm64
            executable: thalos_game
          - name: Windows x64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact: thalos_game-windows-x64
            executable: thalos_game.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install nightly --profile minimal --target ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-cargo-

      - name: Build game
        run: cargo build --release --locked -p thalos_game --target ${{ matrix.target }}

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/${{ matrix.executable }} dist/${{ matrix.artifact }}/
          cp -R assets ships dist/${{ matrix.artifact }}/
          tar -czf dist/${{ matrix.artifact }}.tar.gz -C dist ${{ matrix.artifact }}

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/${{ matrix.artifact }}"
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.executable }}" "dist/${{ matrix.artifact }}/"
          Copy-Item "assets" "dist/${{ matrix.artifact }}/assets" -Recurse
          Copy-Item "ships" "dist/${{ matrix.artifact }}/ships" -Recurse
          Compress-Archive -Path "dist/${{ matrix.artifact }}" -DestinationPath "dist/${{ matrix.artifact }}.zip"

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz
          if-no-files-found: error

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: thalos_game-*
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
